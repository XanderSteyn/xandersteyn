<svg fill="none" viewBox="0 0 1000 130" width="1000" height="130" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>

        .text {
          font-family: 'Inter',
            -apple-system,
            BlinkMacSystemFont,
            'Segoe UI',
            'Roboto',
            'Oxygen',
            'Ubuntu',
            'Cantarell',
            'Fira Sans',
            'Droid Sans',
            'Helvetica Neue',
            sans-serif;
          background: linear-gradient(270deg, #0e78cb, #0d6dc4);
          background-size: 200%;
          background-clip: text;
